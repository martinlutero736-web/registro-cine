<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Formulario de Registro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <div class="container">
    <img src="logo.png" alt="Logo Empresa" class="logo">

    <h1>Formulario de Registro</h1>
    <p>Has sido seleccionado, por favor llena todos los datos para subirte a nuestro sistema.</p>
<div class="progress-bar">
  <div class="progress"></div>
</div>
<form id="miFormulario">


<div class="form-group icon-input">
  <i class="fa fa-user"></i>
  <input type="text" id="nombre" placeholder="Nombre completo" required>
</div>

<div class="form-group icon-input">
  <i class="fa fa-id-card"></i>
  <input type="number" id="cedula" placeholder="Numero de Cedula" required>
</div>

<div class="form-group icon-input">
  <i class="fa fa-phone"></i>
  <input type="tel" id="telefono" placeholder="Numero de telefono" required>
</div>
<div class="form-group icon-input">
  <i class="fa fa-city"></i>
  <input type="text" id="ciudad" placeholder="Ciudad" required>
</div>

<div class="form-group icon-input">
  <i class="fa fa-map-marker-alt"></i>
  <input type="text" id="direccion" placeholder="Dirección de residencia" required>
</div>

<div class="form-group icon-input">
  <i class="fa fa-calendar"></i>
  <input type="number" id="edad" placeholder="Edad" min="18" max="70" required>
</div>
<div class="form-group icon-input">
  <i class="fa fa-envelope"></i>
  <input type="email" id="correo" placeholder="Correo electronico" required>
</div>

  <div class="form-group">
    <label for="genero">Seleccione su género</label>
    <select id="genero" required>
      <option value="">Seleccione una opción</option>
      <option value="Masculino">Masculino</option>
      <option value="Femenino">Femenino</option>
      <option value="Prefiero no decirlo">Prefiero no decirlo</option>
    </select>
  </div>



  <div class="form-group">
    <label for="talla">Seleccione su talla</label>
    <select id="talla" required>
      <option value="">Seleccione una opción</option>
      <option value="XS">XS</option>
      <option value="S">S</option>
      <option value="M">M</option>
      <option value="L">L</option>
      <option value="XL">XL</option>
      <option value="XXL">XXL</option>
    </select>
  </div>

  <div class="form-group">
    <label for="fuente">¿Dónde encontraste la oferta?</label>
    <select id="fuente" required>
      <option value="">Seleccione una opción</option>
      <option value="Redes sociales">Redes sociales</option>
      <option value="Periódico">Periódico</option>
      <option value="Página de empleo">Página de empleo</option>
      <option value="Amigo o conocido">Amigo o conocido</option>
      <option value="Otra">Otra</option>
    </select>
  </div>

  <div class="form-group" id="otraFuenteGroup" style="display:none;">
    <input type="text" id="otra_fuente" placeholder="Si seleccionaste otra, ¿cuál?">
  </div>
<div class="form-group">
  <label style="display:block; margin-bottom:8px;">
    📸 Sube tu foto (obligatorio)
  </label>

  <input type="file"
         id="foto"
         accept="image/png, image/jpeg"
         required
         style="background:#1e293b; padding:10px; border-radius:8px; border:1px solid #334155; color:white; width:100%;">
</div>

<img id="preview"
     style="display:none; width:120px; margin-top:10px; border-radius:10px;">
  <input type="hidden" id="codigo_unico">
<div class="loader" id="loader"></div>
  <button type="submit">Registrarme</button>

</form>
  </div>
<script>
document.getElementById("fuente").addEventListener("change", function() {
  const otraGroup = document.getElementById("otraFuenteGroup");
  const otraInput = document.getElementById("otra_fuente");

  if (this.value === "Otra") {
    otraGroup.style.display = "block";
    otraInput.required = true;
  } else {
    otraGroup.style.display = "none";
    otraInput.required = false;
    otraInput.value = "";
  }
});
</script>
<script>
function generarCodigo() {
  const codigo = 'LOG-' + Date.now();
  document.getElementById("codigo_unico").value = codigo;
  localStorage.setItem("codigoUsuario", codigo);
}
window.onload = generarCodigo;
</script>

<script type="module">

  // 1️⃣ Importar primero initializeApp
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

  // 2️⃣ Configuración Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyCkLv5ntZlYTjzeZq18wUir7oiHghcK6pE",
    authDomain: "registro-cine-1c562.firebaseapp.com",
    projectId: "registro-cine-1c562",
    storageBucket: "registro-cine-1c562.firebasestorage.app",
    messagingSenderId: "351302347628",
    appId: "1:351302347628:web:01494bec1c64e8bd522149"
  };

  // 3️⃣ Inicializar Firebase PRIMERO
  const app = initializeApp(firebaseConfig);

  // 4️⃣ Ahora sí crear Firestore
  const db = getFirestore(app);

  const formulario = document.getElementById("miFormulario");

  formulario.addEventListener("submit", async (e) => {
    e.preventDefault();

    document.querySelector(".progress").style.width = "100%";
    document.getElementById("loader").style.display = "block";

    try {

      await addDoc(collection(db, "registros"), {
        nombre: document.getElementById("nombre").value,
        cedula: document.getElementById("cedula").value,
        telefono: document.getElementById("telefono").value,
        ciudad: document.getElementById("ciudad").value,
        direccion: document.getElementById("direccion").value,
        edad: document.getElementById("edad").value,
        genero: document.getElementById("genero").value,
        correo: document.getElementById("correo").value,
        talla: document.getElementById("talla").value,
        codigo_unico: document.getElementById("codigo_unico").value,
        fecha: new Date(),
        fuente: document.getElementById("fuente").value,
        otra_fuente: document.getElementById("otra_fuente").value,
      });

      window.location.href = "gracias.html";

    } catch (error) {
      console.error("Error:", error);
      alert("Error al enviar el formulario");
    }
  });
   document.getElementById("foto").addEventListener("change", function() {
  const archivo = this.files[0];
  const preview = document.getElementById("preview");

  if (archivo) {
    preview.src = URL.createObjectURL(archivo);
    preview.style.display = "block";
  }
});
</script>

</body>
</html>
